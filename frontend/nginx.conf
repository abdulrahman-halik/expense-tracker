server {
    listen 80;
    server_name localhost;

    # Serve static files from the standard Nginx root directory
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For an SPA (like a React app), try to serve the requested URI.
        # If it doesn't exist, fall back to index.html so React Router takes over.
        try_files $uri $uri/ /index.html;
    }
}
